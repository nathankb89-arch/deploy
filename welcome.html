<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Finance+</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      position: absolute;
      width: 100%;
      top: 0;
      left: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      z-index: 3;
    }

    .logo {
      color: #22c55e;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .navbar a {
      text-decoration: none;
      color: #cbd5f5;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #22c55e;
      border-bottom: 2px solid #22c55e;
    }

    /* WELCOME SECTION */
    .welcome {
      position: relative;
      height: 100vh;

      background: url('https://images.unsplash.com/photo-1563013544-824ae1b704d3') center/cover no-repeat;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(2, 6, 23, 0.75);
    }

    /* CONTENT */
    .welcome-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
      padding: 20px;
    }

    .welcome-content h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: fadeIn 1.5s ease-in-out;
    }

    .welcome-content p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #cbd5f5;
      animation: fadeIn 2s ease-in-out;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      padding: 14px 30px;
      background: #22c55e;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
      box-shadow: 0 0 20px #22c55e;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .welcome-content h1 {
        font-size: 2rem;
      }

      .navbar {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2 class="logo">Finance+</h2>
  <ul>
    <li><a href="/welcome.html">welcome</a></li>
     <li><a href="/wallet.html"></i> Dashboard</a></li>
                <li></li><a href="/transactions.html"></i> Transactions</a></li>
                <li><a href="/analytics.html">Savings Goals</a></li>
                <li><a href="/portfolio.html"><i class="fa-solid fa-chart-line"></i> Investment Portfolio</a></li>
                <li><i class="fa-solid fa-gear"></i> Settings</li>
  </ul>
</nav>

<!-- WELCOME SECTION -->
<section class="welcome">

  <div class="overlay"></div>

  <div class="welcome-content">
    <h1>Take Control of Your Finances 💰</h1>

    <p>
      Finance+ helps you track your spending, grow your savings,
      and make smarter financial decisions — all in one place.
    </p>

    <a href="/project/pics/index.html" class="btn">Get Started</a>
  </div>

</section>

</body>
</html>
